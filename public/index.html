<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="bvpjoV7apAah9sWyaIpsr1SnF01xaBYJ4Mzz_JMGcGU" />
    <title>Weather Dashboard SS | Precise 36-Hour Weather Forecast</title>
    <meta name="description" content="Get a highly accurate 36-hour weather forecast with Weather Dashboard SS. Real-time global updates and city tracking for professional weather analysis.">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Global Reset to prevent shifting */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers everything horizontally */
            width: 100%;
            overflow-x: hidden; /* Prevents side-to-side wobble */
            font-family: 'Poppins', sans-serif;
        }

        /* Ensuring every section stays centered */
        h1, .search-box, #weather, h2, .forecast-desc, #forecast, footer {
            width: 100%;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box {
            margin: 20px 0;
        }

        /* Weather result styling */
        #weather {
            min-height: 100px; /* Prevents "jumping" when data loads */
            margin-bottom: 20px;
        }

        /* The 36 Hours Heading - Special Color */
        h2 {
            color: #ff7e5f; /* A stylish coral/orange color */
            margin-top: 40px;
            font-size: 2rem;
        }

        /* Description below 36 Hours - Different Color */
        .forecast-desc {
            color: #6a11cb; /* A classy deep purple/blue */
            font-weight: 300;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        /* Forecast Grid Centering */
        #forecast {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; 
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
        }

        /* Classy Footer Styling */
        footer {
            margin-top: 50px;
            padding: 30px 0;
            background-color: #f9f9f9;
            width: 100%;
        }

        .footer-text {
            font-family: 'Playfair Display', serif; /* Classy Serif Font */
            font-style: italic;
            color: #333;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .copyright-year {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Weather Dashboard SS",
      "operatingSystem": "WEB",
      "applicationCategory": "WeatherApplication",
      "featureList": "36-hour detailed weather forecasting, global city search"
    }
    </script>
</head>
<body>

    <h1 style="margin-top: 30px;">🌍 Weather Dashboard SS (All Across the Globe)</h1>

    <div class="search-box">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
        <button onclick="getLocationWeather()">📍 My Location</button>
    </div>

    <div id="weather"></div>

    <h2>Next 36 Hours</h2>
    <p class="forecast-desc">Detailed hour-by-hour atmospheric changes and trend analysis.</p>
    
    <div id="forecast"></div>

    <footer>
        <p class="footer-text">© Weather Dashboard by Shoubhya Sinha</p>
        <p class="copyright-year">2026 | Professional Edition</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
