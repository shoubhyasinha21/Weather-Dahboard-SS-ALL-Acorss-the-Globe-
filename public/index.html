<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Weather Dashboard SS | Precise 36-Hour Weather Forecast</title>
    <meta name="description" content="Get a highly accurate 36-hour weather forecast with Weather Dashboard SS. Real-time global updates, humidity, and wind tracking for any city or your current location.">
    <meta name="keywords" content="weather dashboard ss, 36 hour weather forecast, global weather tracker, real-time weather, Shoubhya Sinha weather app">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Weather Dashboard SS",
      "operatingSystem": "WEB",
      "applicationCategory": "WeatherApplication",
      "featureList": "36-hour detailed weather forecasting, real-time location tracking, global city search"

    <link rel="stylesheet" href="style.css">

<body>

<header>
    <h1>🌍 Weather Dashboard SS (All Across the Globe)</h1>
</header>

<main>
    <section class="search-box">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
        <button onclick="getLocationWeather()">📍 My Location</button>
    </section>

    <section id="weather" aria-live="polite">
        </section>

    <section>
        <h2>Next 36 Hours Forecast</h2>
        <p style="color: #666; font-size: 0.9em;">Detailed hour-by-hour weather data and atmospheric conditions.</p>
        <div id="forecast"></div>
    </section>
</main>

</footer>
